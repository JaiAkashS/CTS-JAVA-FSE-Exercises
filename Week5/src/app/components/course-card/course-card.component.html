<div 
  class="course-card" 
  [ngClass]="{
    'card--enrolled': (enrolledIds$ | async)?.includes(course.id),
    'card--full': course && course.credits >= 4
  }"
  [ngStyle]="{
    'border-left': '6px solid ' + (course.gradeStatus === 'passed' ? '#2ecc71' : (course.gradeStatus === 'failed' ? '#e74c3c' : '#95a5a6'))
  }"
  [appHighlight]="'rgba(161, 196, 253, 0.1)'"
>
  <div class="card-header">
    <h3 class="course-name">{{ course.name }}</h3>
    <div [ngSwitch]="course.gradeStatus" class="status-badge">
      <span *ngSwitchCase="'passed'" class="badge badge-passed">Passed</span>
      <span *ngSwitchCase="'failed'" class="badge badge-failed">Failed</span>
      <span *ngSwitchCase="'pending'" class="badge badge-pending">Pending</span>
      <span *ngSwitchDefault class="badge badge-pending">Unknown</span>
    </div>
  </div>

  <div class="card-body">
    <p class="course-credits">
      <span class="info-icon">🏷️</span> {{ course.credits | creditLabel }}
    </p>
  </div>

  <div class="card-details-expanded" *ngIf="isExpanded">
    <div class="details-divider"></div>
    <p><strong>Course Code:</strong> <code>{{ course.code }}</code></p>
    <p><strong>Course ID:</strong> <code>{{ course.id }}</code></p>
  </div>

  <div class="card-footer">
    <a [routerLink]="['/courses', course.id]" class="btn btn-secondary btn-sm">View Details</a>
    <button 
      class="btn btn-sm" 
      [ngClass]="((enrolledIds$ | async)?.includes(course.id)) ? 'btn-danger' : 'btn-primary'"
      (click)="onEnroll()"
    >
      {{ ((enrolledIds$ | async)?.includes(course.id)) ? 'Unenroll' : 'Enroll' }}
    </button>
  </div>
</div>
